# Docker Compose — local demo only (not production-grade).
# Backend defaults to mock LLM mode; no real API keys required.
# To use real providers, set env vars on the backend service or copy
# .env.docker.example to .env.docker and uncomment the env_file line.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    # Uncomment the next line to load provider keys from .env.docker:
    # env_file: .env.docker
    environment:
      LLM_MODE: mock
      LLM_DEFAULT_PROVIDER: mock
      LLM_FALLBACK_PROVIDER: mock
      LLM_FALLBACK_ON_ERROR: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
